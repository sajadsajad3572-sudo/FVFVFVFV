name: بناء مكتبة dylib

on:
  push:
    branches: [ "main" ]  # غيّر إلى "master" إذا كان فرعك الرئيسي كذلك
  workflow_dispatch:     # تتيح لك تشغيل البناء يدوياً من المتصفح

jobs:
  build-macos:
    runs-on: macos-latest   # يحدد أن الخادم سيكون نظام macOS

    steps:
      # 1. تحميل الكود من المستودع
      - name: سحب الكود المصدر
        uses: actions/checkout@v4

      # 2. (اختياري) عرض محتويات المجلد للتأكد
      - name: عرض الملفات
        run: ls -la

      # 3. بناء ملف dylib (عدّل الأمر حسب لغتك)
      - name: تجميع المكتبة
        run: |
          # إذا كان الكود بلغة C
          gcc -shared -o mylibrary.dylib *.c -fPIC
          
          # إذا كان الكود بلغة C++، استخدم هذا السطر بدلاً من السطر أعلاه، وعلّق على السطر السابق:
          # g++ -shared -o mylibrary.dylib *.cpp -fPIC

      # 4. رفع الملف الناتج ليصبح قابلاً للتحميل
      - name: رفع الملف
        uses: actions/upload-artifact@v4
        with:
          name: مكتبتي-المجمعة
          path: mylibrary.dylib
