name: بناء مكتبة dylib

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: سحب الكود المصدر
        uses: actions/checkout@v4

      - name: عرض الملفات للتأكد
        run: ls -la

      - name: تجميع المكتبة
        run: |
          cd src
          gcc -shared -o ../mylibrary.dylib *.c -fPIC
          cd ..

      - name: رفع الملف
        uses: actions/upload-artifact@v4
        with:
          name: مكتبتي-المجمعة
          path: mylibrary.dylib
